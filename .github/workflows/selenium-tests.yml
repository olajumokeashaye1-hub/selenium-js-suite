
name: Selenium JS Tests

on:
  push:
    branches: [ main ]  # Change 'main' to your default branch if different
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # LTS version - matches our setup

      - name: Install dependencies
        run: npm ci  # Faster than npm install for CI

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run tests
        run: npm test